options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-southwest1
  _AR_REPOSITORY: flowdex
  _SERVICE_NAME: flowdex-api
  _INSTANCE_CONNECTION_NAME: flowdex-490012:europe-southwest1:flowdex
  _DB_NAME: postgres
  _DB_USER: postgres
  _RUNTIME_SERVICE_ACCOUNT: flowdex-api@flowdex-490012.iam.gserviceaccount.com
  _SECRET_KEY_SECRET: flowdex-secret
  _DB_PASSWORD_SECRET: flowdex-db-password

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--service-account"
      - "${_RUNTIME_SERVICE_ACCOUNT}"
      - "--add-cloudsql-instances"
      - "${_INSTANCE_CONNECTION_NAME}"
      - "--set-env-vars"
      - "ACCESS_TOKEN_EXPIRE_MINUTES=60,INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER}"
      - "--set-secrets"
      - "SECRET_KEY=${_SECRET_KEY_SECRET}:latest,DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest"
